name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip utilities
        run: |
          zip jbw_utils.zip \
            LICENSE \
            README.md \
            RefreshEnv.cmd \
            mdcd.cmd \
            mdcd.ps1 \
            mdcd.sh \
            setup_machine.ps1 \
            up.cmd \
            up.ps1 \
            up.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jbw_utils.zip
          generate_release_notes: true
